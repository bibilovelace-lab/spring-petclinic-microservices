name: CI/CD Pipeline - PetClinic Microservices

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build com Maven
        run: ./mvnw -B clean package -DskipTests

      - name: Executar testes
        run: ./mvnw -B test

      - name: Upload de artefatos
        uses: actions/upload-artifact@v4
        with:
          name: jar-files
          path: '**/target/*.jar'

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - spring-petclinic-customers-service
          - spring-petclinic-vets-service
          - spring-petclinic-visits-service
          - spring-petclinic-api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build do JAR de ${{ matrix.service }}
        run: ./mvnw -B -pl ${{ matrix.service }} -am package -DskipTests
      - name: Build da imagem Docker
        run: docker build -t petclinic/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}
